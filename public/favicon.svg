<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="pulse-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6" />
      <stop offset="50%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
  </defs>
  
  <!-- Globe representation (Earth) -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#brand-grad)" stroke-width="24" />
  <circle cx="256" cy="256" r="230" fill="url(#brand-grad)" fill-opacity="0.05" />
  
  <!-- Latitude/Longitude lines -->
  <ellipse cx="256" cy="256" rx="115" ry="230" fill="none" stroke="url(#brand-grad)" stroke-width="12" stroke-opacity="0.3" />
  <ellipse cx="256" cy="256" rx="230" ry="90" fill="none" stroke="url(#brand-grad)" stroke-width="12" stroke-opacity="0.3" />
  
  <!-- Pulse Waveform -->
  <path d="M 80 256 L 190 256 L 215 360 L 245 100 L 275 310 L 295 256 L 432 256" 
        fill="none" stroke="url(#pulse-grad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
        
  <!-- Math Plus (+) Symbol -->
  <g stroke="#10b981" stroke-width="36" stroke-linecap="round">
    <line x1="330" y1="160" x2="390" y2="160" />
    <line x1="360" y1="130" x2="360" y2="190" />
  </g>
</svg>
